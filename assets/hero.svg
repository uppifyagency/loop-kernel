<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" width="1280" height="420" role="img" aria-label="loop-kernel — the simplest AI agent loop that provably halts. Loop engineering, SOTA 2026.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1020"/>
      <stop offset="0.55" stop-color="#0e1730"/>
      <stop offset="1" stop-color="#131d36"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1f2d52" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0e1730" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="0.4" stop-color="#3b82f6"/>
      <stop offset="0.72" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cdd9f5"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="420" fill="url(#bg)"/>
  <circle cx="1015" cy="205" r="230" fill="url(#glow)"/>

  <!-- faint dotted grid -->
  <g fill="#243152" opacity="0.35">
    <g>
      <circle cx="120" cy="350" r="1.6"/><circle cx="160" cy="350" r="1.6"/><circle cx="200" cy="350" r="1.6"/>
      <circle cx="120" cy="380" r="1.6"/><circle cx="160" cy="380" r="1.6"/><circle cx="200" cy="380" r="1.6"/>
    </g>
  </g>

  <!-- loop mark: 4-color cycle (robust dashed circles) -->
  <g fill="none" stroke-width="13" stroke-linecap="round">
    <circle cx="1015" cy="205" r="125" stroke="#34d399" stroke-dasharray="170 615" transform="rotate(6 1015 205)"/>
    <circle cx="1015" cy="205" r="125" stroke="#3b82f6" stroke-dasharray="170 615" transform="rotate(96 1015 205)"/>
    <circle cx="1015" cy="205" r="125" stroke="#8b5cf6" stroke-dasharray="170 615" transform="rotate(186 1015 205)"/>
    <circle cx="1015" cy="205" r="125" stroke="#fb7185" stroke-dasharray="170 615" transform="rotate(276 1015 205)"/>
  </g>
  <polygon points="1025.4,330.3 1042.7,334.8 1039.3,319.5" fill="#34d399"/>
  <polygon points="1004.6,79.4 987.3,74.9 990.7,90.5" fill="#8b5cf6"/>
  <!-- core dot -->
  <circle cx="1015" cy="205" r="6" fill="#e2e8f0"/>

  <!-- text block -->
  <text x="92" y="120" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="18" letter-spacing="5" fill="#7f93b8" font-weight="600">LOOP ENGINEERING · SOTA 2026</text>

  <text x="88" y="222" font-family="'SFMono-Regular', 'JetBrains Mono', 'Fira Code', ui-monospace, monospace"
        font-size="92" font-weight="800" fill="url(#title)">loop-kernel</text>

  <text x="92" y="272" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="30" fill="#c3d0e8">the simplest agent loop that <tspan fill="#7ee3b8" font-style="italic" font-weight="600">provably halts</tspan></text>

  <!-- stop chips -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="17" font-weight="600">
    <g transform="translate(92,310)">
      <rect width="150" height="38" rx="19" fill="#0c1730" stroke="#23314f"/>
      <circle cx="24" cy="19" r="6" fill="#34d399"/>
      <text x="40" y="25" fill="#d7e1f4">success</text>
    </g>
    <g transform="translate(254,310)">
      <rect width="186" height="38" rx="19" fill="#0c1730" stroke="#23314f"/>
      <circle cx="24" cy="19" r="6" fill="#f5b945"/>
      <text x="40" y="25" fill="#d7e1f4">no-progress</text>
    </g>
    <g transform="translate(452,310)">
      <rect width="116" height="38" rx="19" fill="#0c1730" stroke="#23314f"/>
      <circle cx="24" cy="19" r="6" fill="#fb7185"/>
      <text x="40" y="25" fill="#d7e1f4">cap</text>
    </g>
  </g>

  <!-- author -->
  <text x="92" y="390" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="16" fill="#5d6f93">by Uppify Agency</text>

  <!-- bottom accent line -->
  <rect x="0" y="416" width="1280" height="4" fill="url(#accent)"/>
</svg>
