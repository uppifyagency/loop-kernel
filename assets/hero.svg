<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 440" width="1280" height="440" role="img" aria-label="loop-kernel — say “set up a loop” to your agent: it interviews you, then writes a self-driving loop that provably halts. Agent-native loop engineering: six questions, an unfakeable verifier, three hard stops, durable memory.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1020"/>
      <stop offset="0.55" stop-color="#0e1730"/>
      <stop offset="1" stop-color="#131d36"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#223260" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0e1730" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1a2748"/>
      <stop offset="1" stop-color="#0e1730" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="0.4" stop-color="#3b82f6"/>
      <stop offset="0.72" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c3d2f2"/>
    </linearGradient>
    <linearGradient id="seg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#22b07f"/></linearGradient>
    <linearGradient id="seg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3b82f6"/><stop offset="1" stop-color="#2f6bd6"/></linearGradient>
    <linearGradient id="seg3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#7546e0"/></linearGradient>
    <linearGradient id="seg4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fb7185"/><stop offset="1" stop-color="#e85a72"/></linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="440" fill="url(#bg)"/>
  <circle cx="1010" cy="220" r="250" fill="url(#glow)"/>

  <!-- faint dotted grid, lower-left -->
  <g fill="#27365a" opacity="0.5">
    <circle cx="96" cy="356" r="1.5"/><circle cx="128" cy="356" r="1.5"/><circle cx="160" cy="356" r="1.5"/><circle cx="192" cy="356" r="1.5"/>
    <circle cx="96" cy="384" r="1.5"/><circle cx="128" cy="384" r="1.5"/><circle cx="160" cy="384" r="1.5"/><circle cx="192" cy="384" r="1.5"/>
  </g>

  <!-- ============================ THE LOOP MARK ============================ -->
  <!-- soft core depth -->
  <circle cx="1010" cy="220" r="96" fill="url(#core)"/>

  <!-- rotating ring: 4 filled segments (fill-based → rasterizes on macOS) + directional arrowheads -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 1010 220" to="360 1010 220" dur="26s" repeatCount="indefinite"/>
      <!-- segment 1 — emerald (right) -->
      <path d="M1141.28 233.80 A132 132 0 0 1 1023.80 351.28 L1020.87 323.43 A104 104 0 0 0 1113.43 230.87 Z" fill="url(#seg1)"/>
      <!-- segment 2 — blue (bottom) -->
      <path d="M996.20 351.28 A132 132 0 0 1 878.72 233.80 L906.57 230.87 A104 104 0 0 0 999.13 323.43 Z" fill="url(#seg2)"/>
      <!-- segment 3 — violet (left) -->
      <path d="M878.72 206.20 A132 132 0 0 1 996.20 88.72 L999.13 116.57 A104 104 0 0 0 906.57 209.13 Z" fill="url(#seg3)"/>
      <!-- segment 4 — rose (top) -->
      <path d="M1023.80 88.72 A132 132 0 0 1 1141.28 206.20 L1113.43 209.13 A104 104 0 0 0 1020.87 116.57 Z" fill="url(#seg4)"/>
      <!-- arrowheads at the gaps, each colored by the segment it flows INTO (clockwise) -->
      <polygon points="1128,227 1122,215 1134,215" fill="#34d399"/>  <!-- into emerald, down -->
      <polygon points="1003,338 1015,332 1015,344" fill="#3b82f6"/>  <!-- into blue, left -->
      <polygon points="892,213 898,225 886,225" fill="#8b5cf6"/>     <!-- into violet, up -->
      <polygon points="1017,102 1005,108 1005,96" fill="#fb7185"/>   <!-- into rose, right -->
  </g>

  <!-- core: pulsing halo + bright kernel dot -->
  <circle cx="1010" cy="220" r="15" fill="#34d399" opacity="0.18">
    <animate attributeName="r" values="13;19;13" dur="3.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.10;0.26;0.10" dur="3.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1010" cy="220" r="6.5" fill="#eaf2ff"/>

  <!-- ===================== THE PROMPT — what feeds the loop ===================== -->
  <g>
    <rect x="640" y="56" width="236" height="42" rx="21" fill="#0c1730" stroke="#243352"/>
    <text x="660" y="83" font-family="'SFMono-Regular', 'JetBrains Mono', 'Fira Code', ui-monospace, monospace"
          font-size="15" fill="#d7e1f4"><tspan fill="#34d399">❯</tspan> set up a loop</text>
    <!-- dashed feed-line: natural language → the loop -->
    <path d="M 878 80 C 908 86, 922 98, 921 118" fill="none" stroke="#7f93b8" stroke-width="1.6"
          stroke-dasharray="4 5" opacity="0.75"/>
    <polygon points="925,127 912,121 920,111" fill="#7f93b8" opacity="0.85"/>
  </g>

  <!-- ============================== TEXT BLOCK ============================= -->
  <text x="92" y="104" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="17" letter-spacing="5.5" fill="#7f93b8" font-weight="600">LOOP ENGINEERING · 2026</text>

  <text x="88" y="196" font-family="'SFMono-Regular', 'JetBrains Mono', 'Fira Code', ui-monospace, monospace"
        font-size="90" font-weight="800" fill="url(#title)">loop-kernel</text>

  <text x="92" y="244" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="28" fill="#c3d0e8">say <tspan fill="#eaf2ff" font-weight="600">“set up a loop”</tspan> — your agent interviews you,</text>
  <text x="92" y="278" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="28" fill="#c3d0e8">then writes a loop that <tspan fill="#7ee3b8" font-style="italic" font-weight="600">provably halts</tspan></text>

  <text x="92" y="310" font-family="'SFMono-Regular', 'JetBrains Mono', ui-monospace, monospace"
        font-size="15.5" letter-spacing="0.3" fill="#6f83a8">six questions → /goal · unfakeable check · three hard stops · durable memory</text>

  <!-- three hard-stop chips -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16.5" font-weight="600">
    <g transform="translate(92,334)">
      <rect width="142" height="38" rx="19" fill="#0c1730" stroke="#243352"/>
      <circle cx="23" cy="19" r="6" fill="#34d399"/>
      <text x="39" y="25" fill="#d7e1f4">success</text>
    </g>
    <g transform="translate(246,334)">
      <rect width="178" height="38" rx="19" fill="#0c1730" stroke="#243352"/>
      <circle cx="23" cy="19" r="6" fill="#f5b945"/>
      <text x="39" y="25" fill="#d7e1f4">no-progress</text>
    </g>
    <g transform="translate(436,334)">
      <rect width="108" height="38" rx="19" fill="#0c1730" stroke="#243352"/>
      <circle cx="23" cy="19" r="6" fill="#fb7185"/>
      <text x="39" y="25" fill="#d7e1f4">cap</text>
    </g>
  </g>

  <!-- author -->
  <text x="92" y="408" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="15" fill="#5d6f93">~110 lines of bash · no dependencies · AGENTS.md + skill inside · by Uppify Agency</text>

  <!-- bottom accent line -->
  <rect x="0" y="436" width="1280" height="4" fill="url(#accent)"/>
</svg>
